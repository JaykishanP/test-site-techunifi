<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>News Feed</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container py-5">
    <h2 class="mb-4">Latest News</h2>

    <!-- Search -->
    <div class="mb-4">
        <input type="text" id="searchInput" class="form-control" placeholder="Search news by title or content...">
    </div>

    <!-- News Section -->
    <div id="newsSection"></div>

    <!-- Pagination -->
    <nav>
        <ul id="pagination" class="pagination justify-content-center mt-4"></ul>
    </nav>
</div>

<script>
    let newsData = [];
    let filteredData = [];
    let currentPage = 1;
    const itemsPerPage = 5;

    function fetchNews() {
        fetch('news.json')
            .then(res => res.json())
            .then(data => {
                newsData = data;
                filteredData = [...newsData]; // clone array
                currentPage = 1;
                displayNews();
                setupPagination();
            })
            .catch(err => console.error("Error loading news:", err));
    }

function displayNews() {
    const newsSection = document.getElementById('newsSection');
    newsSection.innerHTML = '';

    let start = (currentPage - 1) * itemsPerPage;
    let end = start + itemsPerPage;
    let paginatedItems = filteredData.slice(start, end);

    if (paginatedItems.length === 0) {
        newsSection.innerHTML = '<p class="text-muted">No news found.</p>';
        return;
    }

    paginatedItems.forEach(article => {
        // Normalize images into an array (supports article.images[] or article.image)
        const images = Array.isArray(article.images)
            ? article.images
            : Array.isArray(article.image)
                ? article.image
                : (article.image ? [article.image] : []);

        // Build gallery HTML: 2 images per row
        let imagesHTML = '';
        if (images.length > 0) {
            imagesHTML += '<div class="container-fluid mt-3">';
            for (let i = 0; i < images.length; i += 2) {
                imagesHTML += '<div class="row mb-2">';
                // first image in the row
                imagesHTML += `
                    <div class="col-12 col-sm-6 mb-2">
                        <img src="${images[i]}" class="img-fluid rounded" alt="${article.title || ''}" loading="lazy">
                    </div>
                `;
                // second image in the row (if exists)
                if (i + 1 < images.length) {
                    imagesHTML += `
                        <div class="col-12 col-sm-6 mb-2">
                            <img src="${images[i + 1]}" class="img-fluid rounded" alt="${article.title || ''}" loading="lazy">
                        </div>
                    `;
                } else {
                    // If odd number, keep the second column empty (keeps layout consistent)
                    imagesHTML += `<div class="col-12 col-sm-6 mb-2"></div>`;
                }
                imagesHTML += '</div>'; // close row
            }
            imagesHTML += '</div>'; // close container-fluid
        }

        // Render the card with the images gallery inserted
        newsSection.innerHTML += `
            <div class="card mb-3">
                <div class="card-body">
                    <h5 class="card-title">${article.title || ''}</h5>
                    <h6 class="card-subtitle mb-2 text-muted">${article.location || ''} - ${article.date || ''}</h6>
                    <p class="card-text">${article.content || ''}</p>
                    ${imagesHTML}
                </div>
            </div>
        `;
    });
}


    function setupPagination() {
    const pagination = document.getElementById('pagination');
    pagination.innerHTML = '';

    let totalPages = Math.ceil(filteredData.length / itemsPerPage);

    if (totalPages <= 1) return; // No pagination needed

    for (let i = 1; i <= totalPages; i++) {
        let li = document.createElement('li');
        li.classList.add('page-item');
        if (i === currentPage) {
            li.classList.add('active');
        }
        li.innerHTML = `<a class="page-link" href="#">${i}</a>`;
        li.addEventListener('click', function (e) {
            e.preventDefault();
            currentPage = i;
            displayNews();
            setupPagination();
        });
        pagination.appendChild(li);
    }
}

    document.getElementById('searchInput').addEventListener('input', function () {
        const searchText = this.value.toLowerCase();
        filteredData = newsData.filter(article =>
            article.title.toLowerCase().includes(searchText) ||
            article.content.toLowerCase().includes(searchText)
        );
        currentPage = 1;
        displayNews();
        setupPagination();
    });

    fetchNews();
</script>


</body>
</html>
