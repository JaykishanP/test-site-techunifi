<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>News Feed</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container py-5">
    <h2 class="mb-4">Latest News</h2>

    <!-- Search -->
    <div class="mb-4">
        <input type="text" id="searchInput" class="form-control" placeholder="Search news by title or content...">
    </div>

    <!-- News Section -->
    <div id="newsSection"></div>

    <!-- Pagination -->
    <nav>
        <ul id="pagination" class="pagination justify-content-center mt-4"></ul>
    </nav>
</div>

<script>
    let newsData = [];
    let filteredData = [];
    let currentPage = 1;
    const itemsPerPage = 5;

    // Fetch news from JSON
    function fetchNews() {
        fetch('news.json') // Update if hosted elsewhere
            .then(res => res.json())
            .then(data => {
                newsData = data;
                filteredData = data;
                displayNews();
                setupPagination();
            })
            .catch(err => console.error("Error loading news:", err));
    }

    // Display news based on current page
    function displayNews() {
        const newsSection = document.getElementById('newsSection');
        newsSection.innerHTML = '';

        let start = (currentPage - 1) * itemsPerPage;
        let end = start + itemsPerPage;
        let paginatedItems = filteredData.slice(start, end);

        if (paginatedItems.length === 0) {
            newsSection.innerHTML = '<p class="text-muted">No news found.</p>';
            return;
        }

        paginatedItems.forEach(article => {
            let articleHTML = `
                <div class="card mb-3">
                    <div class="card-body">
                        <h5 class="card-title">${article.title}</h5>
                        <h6 class="card-subtitle mb-2 text-muted">${article.location} - ${article.date}</h6>
                        <p class="card-text">${article.content}</p>
                        <img src="${article.image}" class="img-fluid rounded" alt="${article.title}">
                    </div>
                </div>
            `;
            newsSection.innerHTML += articleHTML;
        });
    }

    // Create pagination numbers
    function setupPagination() {
        const pagination = document.getElementById('pagination');
        pagination.innerHTML = '';

        let totalPages = Math.ceil(filteredData.length / itemsPerPage);

        for (let i = 1; i <= totalPages; i++) {
            let li = document.createElement('li');
            li.classList.add('page-item', i === currentPage ? 'active' : '');
            li.innerHTML = `<a class="page-link" href="#">${i}</a>`;
            li.addEventListener('click', function (e) {
                e.preventDefault();
                currentPage = i;
                displayNews();
                setupPagination();
            });
            pagination.appendChild(li);
        }
    }

    // Search function
    document.getElementById('searchInput').addEventListener('input', function () {
        const searchText = this.value.toLowerCase();
        filteredData = newsData.filter(article =>
            article.title.toLowerCase().includes(searchText) ||
            article.content.toLowerCase().includes(searchText)
        );
        currentPage = 1;
        displayNews();
        setupPagination();
    });

    // Init
    fetchNews();
</script>

</body>
</html>
